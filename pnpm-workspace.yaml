ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

minimumReleaseAge: 10080

# next is pinned exactly and its @next/swc-* binaries are released in lockstep,
# so a fresh Next.js patch would otherwise be uninstallable for 7 days.
minimumReleaseAgeExclude:
  - next
  - '@next/*'

# Transitive deps whose latest releases are younger than minimumReleaseAge;
# pinned to the newest vetted (7+ day old) versions instead of excluding them
# from the age gate. Revisit when their latest releases mature.
overrides:
  '@napi-rs/wasm-runtime': 1.1.4

# @emnapi/* are peers of @napi-rs/wasm-runtime, used only by wasm32-wasi
# fallback bindings of build tooling (oxc/rolldown) that never load on our
# targets; skipping auto-install keeps the release-age gate intact.
peerDependencyRules:
  ignoreMissing:
    - '@emnapi/*'

trustPolicy: no-downgrade
